name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: go build -o bubblefish ./cmd/bubblefish/

      - name: Test
        run: go test ./...

      - name: Test with race detector
        if: runner.os != 'Windows'
        env:
          CGO_ENABLED: 1
        run: go test ./... -race

      - name: Vet
        run: go vet ./...
