# BubbleFish Nexus — Blessed Config: Claude Code / Agents (HTTP)
#
# HTTP API usage pattern for Claude Code and agent workflows.
# Safe defaults, recommended idempotency key format.
#
# Reference: Tech Spec Section 13.5.

[daemon]
port       = 8000
bind       = "127.0.0.1"
admin_token = "env:BUBBLEFISH_ADMIN_TOKEN"
log_level  = "info"
log_format = "text"
mode       = "balanced"
queue_size = 512

[daemon.shutdown]
drain_timeout_seconds = 30

[daemon.wal]
path               = ""  # defaults to ~/.bubblefish/Nexus/wal/
max_segment_size_mb = 10

[daemon.wal.integrity]
mode = "crc32"

[daemon.rate_limit]
global_requests_per_minute = 300

[daemon.web]
port         = 8081
require_auth = true

# ---------------------------------------------------------------------------
# Source: Claude Code
# ---------------------------------------------------------------------------

[source]
name               = "claude-code"
api_key            = "env:BUBBLEFISH_CLAUDE_CODE_KEY"
namespace          = "project"
can_read           = true
can_write          = true
target_destination = "sqlite-local"
default_actor_type = "agent"
default_profile    = "fast"

[source.rate_limit]
requests_per_minute = 120

[source.payload_limits]
max_bytes = 131072

# Idempotency keys should follow the format:
#   <session-id>-<operation>-<unix-ms>
# Example: sess-abc123-write-1719500000000
[source.idempotency]
enabled              = true
dedup_window_seconds = 7200

[source.policy]
allowed_destinations    = ["sqlite-local"]
allowed_operations      = ["read", "write"]
allowed_retrieval_modes = ["exact", "semantic", "hybrid"]
allowed_profiles        = ["fast", "balanced", "deep"]
max_results             = 50
max_response_bytes      = 65536

[source.policy.cache]
read_from_cache               = true
write_to_cache                = true
max_ttl_seconds               = 600
semantic_similarity_threshold = 0.80
