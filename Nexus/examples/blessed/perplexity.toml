# BubbleFish Nexus — Blessed Config: Perplexity
#
# HTTP source template for Perplexity with appropriate rate limits
# and field mapping.
#
# Reference: Tech Spec Section 13.5.

[daemon]
port       = 8000
bind       = "127.0.0.1"
admin_token = "env:BUBBLEFISH_ADMIN_TOKEN"
log_level  = "info"
log_format = "text"
mode       = "balanced"
queue_size = 256

[daemon.shutdown]
drain_timeout_seconds = 30

[daemon.wal]
path               = ""  # defaults to ~/.bubblefish/Nexus/wal/
max_segment_size_mb = 10

[daemon.wal.integrity]
mode = "crc32"

[daemon.rate_limit]
global_requests_per_minute = 120

[daemon.web]
port         = 8081
require_auth = true

# ---------------------------------------------------------------------------
# Source: Perplexity
# ---------------------------------------------------------------------------

[source]
name               = "perplexity"
api_key            = "env:BUBBLEFISH_PERPLEXITY_KEY"
namespace          = "research"
can_read           = true
can_write          = true
target_destination = "sqlite-local"
default_actor_type = "agent"
default_profile    = "balanced"

# Perplexity can be bursty during research sessions; allow higher RPM
# but keep global cap reasonable.
[source.rate_limit]
requests_per_minute = 90

[source.payload_limits]
max_bytes = 131072

[source.idempotency]
enabled              = true
dedup_window_seconds = 3600

# Perplexity payloads follow the OpenAI-compatible chat format.
[source.mapping]
content = "choices.0.message.content"
model   = "model"
role    = "choices.0.message.role"
subject = "id"

[source.policy]
allowed_destinations    = ["sqlite-local"]
allowed_operations      = ["read", "write"]
allowed_retrieval_modes = ["exact", "semantic", "hybrid"]
allowed_profiles        = ["fast", "balanced"]
max_results             = 25
max_response_bytes      = 32768

[source.policy.cache]
read_from_cache               = true
write_to_cache                = true
max_ttl_seconds               = 600
semantic_similarity_threshold = 0.82
