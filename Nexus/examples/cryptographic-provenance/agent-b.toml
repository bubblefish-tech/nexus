# Agent B — reads memories written by Agent A.
# Agent B has read-only access to verify provenance across vendors.
#
# Reference: v0.1.3 Build Plan Phase 4 Subtask 4.12.

[source]
name = "agent-b"
api_key = "env:AGENT_B_KEY"
namespace = "demo"
can_read = true
can_write = false
target_destination = "sqlite"
default_actor_type = "agent"
default_actor_id = "agent-b-demo"
