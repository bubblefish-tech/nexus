# BubbleFish Nexus — Blessed Config: Open WebUI (Ollama)
#
# Ollama source template with correct mapping paths for Open WebUI
# payload shape. Adjust model and destination to match your setup.
#
# Reference: Tech Spec Section 13.5.

[daemon]
port       = 8000
bind       = "127.0.0.1"
admin_token = "env:BUBBLEFISH_ADMIN_TOKEN"
log_level  = "info"
log_format = "text"
mode       = "balanced"
queue_size = 256

[daemon.shutdown]
drain_timeout_seconds = 30

[daemon.wal]
path               = ""  # defaults to ~/.bubblefish/Nexus/wal/
max_segment_size_mb = 10

[daemon.wal.integrity]
mode = "crc32"

[daemon.rate_limit]
global_requests_per_minute = 180

[daemon.web]
port         = 8081
require_auth = true

# ---------------------------------------------------------------------------
# Source: Open WebUI
# ---------------------------------------------------------------------------

[source]
name               = "open-webui"
api_key            = "env:BUBBLEFISH_OPENWEBUI_KEY"
namespace          = "conversations"
can_read           = true
can_write          = true
target_destination = "sqlite-local"
default_actor_type = "human"
default_profile    = "balanced"

[source.rate_limit]
requests_per_minute = 60

[source.payload_limits]
max_bytes = 131072

[source.idempotency]
enabled              = true
dedup_window_seconds = 3600

# Open WebUI sends Ollama-format payloads. Map the relevant fields
# to BubbleFish Nexus canonical envelope fields.
[source.mapping]
content = "messages.-1.content"
model   = "model"
role    = "messages.-1.role"
subject = "metadata.conversation_id"

[source.policy]
allowed_destinations    = ["sqlite-local"]
allowed_operations      = ["read", "write"]
allowed_retrieval_modes = ["exact", "semantic", "hybrid"]
allowed_profiles        = ["fast", "balanced"]
max_results             = 30
max_response_bytes      = 32768

[source.policy.cache]
read_from_cache               = true
write_to_cache                = true
max_ttl_seconds               = 300
semantic_similarity_threshold = 0.85
