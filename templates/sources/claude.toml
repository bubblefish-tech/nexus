name        = "Claude Desktop"
endpoint    = "/inbound/claude"
color       = "#D97706"
can_read    = false
can_write   = true

[auth]
type        = "api_key"
header      = "Authorization"
env_var     = "CLAUDE_API_KEY"

[mapping]
content     = "payload.message.content.0.text"
model       = "payload.model"
role        = "payload.message.role"
source      = "'claude'"
