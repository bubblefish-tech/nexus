# Perplexity example source

name        = "Perplexity"
endpoint    = "/inbound/perplexity"
color       = "#6366F1"
can_read    = false
can_write   = true

[auth]
type        = "api_key"               # "none" | "api_key"
header      = "Authorization"
env_var     = "PERPLEXITY_API_KEY"

[mapping]
content     = "payload.choices.0.message.content"
model       = "payload.model"
role        = "payload.choices.0.message.role"
source      = "'perplexity'"
